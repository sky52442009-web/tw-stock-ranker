name: Deploy Taiwan Stock Ranker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 19:10 Asia/Taipei on weekdays, after Taiwan market post-close data is usually available.
    - cron: "10 11 * * 1-5"
    # Extra retry at 20:10 Asia/Taipei.
    - cron: "10 12 * * 1-5"
    # Backup run at 21:30 Asia/Taipei in case the first scheduled run is delayed or skipped.
    - cron: "30 13 * * 1-5"
    # Final backup at 22:30 Asia/Taipei.
    - cron: "30 14 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve Taiwan date
        run: echo "TPE_DATE=$(TZ=Asia/Taipei date +%F)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore market data cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: tw-stock-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            tw-stock-cache-${{ runner.os }}-

      - name: Build latest ranking
        run: python tw_stock_ranker.py --end-date "$TPE_DATE" --lookback-days 110 --top 100 --output-dir outputs --cache-dir data/cache

      - name: Build static site
        run: python build_static_site.py --limit 100 --site-dir site

      - name: Show generated health
        run: cat site/health.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
