name: Deploy Taiwan Stock Ranker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 19:10 Asia/Taipei on weekdays, after Taiwan market post-close data is usually available.
    - cron: "10 11 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build latest ranking
        run: python tw_stock_ranker.py --top 100 --output-dir outputs --cache-dir data/cache

      - name: Build static site
        run: python build_static_site.py --limit 100 --site-dir site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
